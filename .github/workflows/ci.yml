name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/fractal-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/fractal-app
        run: npm ci

      - name: Lint
        working-directory: frontend/fractal-app
        run: npm run lint

      - name: Build
        working-directory: frontend/fractal-app
        run: npm run build

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive infra/terraform infra/terraform-state

      - name: Init application stack
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Validate application stack
        working-directory: infra/terraform
        run: terraform validate

      - name: Init state bootstrap stack
        working-directory: infra/terraform-state
        run: terraform init -backend=false

      - name: Validate state bootstrap stack
        working-directory: infra/terraform-state
        run: terraform validate
